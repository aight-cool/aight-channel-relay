name = "channel-relay"
main = "src/index.ts"
account_id = "09385734b0e448260193c7f758a44d0b"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain: channels.aight.cool (configure in Cloudflare dashboard)
# routes = [{ pattern = "channels.aight.cool/*", zone_name = "aight.cool" }]

# Secrets (set via `wrangler secret put`):
# RELAY_SECRET — HMAC signing key for session tokens

# RELAY_SECRET is set via `wrangler secret put RELAY_SECRET` for production.
# For local dev, create a .dev.vars file (gitignored):
#   RELAY_SECRET=your-dev-secret-here

# Durable Objects
[durable_objects]
bindings = [
  { name = "CHANNEL_ROOM", class_name = "ChannelRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChannelRoom"]
