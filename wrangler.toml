name = "channel-relay"
main = "src/index.ts"
# account_id is set via CLOUDFLARE_ACCOUNT_ID env var (GitHub Actions secret)
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain (configure in Cloudflare dashboard after deploying):
# routes = [{ pattern = "channels.example.com/*", zone_name = "example.com" }]

# For local dev, create a .dev.vars file (gitignored):
#   RELAY_SECRET=your-dev-secret-here

# Durable Objects
[durable_objects]
bindings = [
  { name = "CHANNEL_ROOM", class_name = "ChannelRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["ChannelRoom"]
